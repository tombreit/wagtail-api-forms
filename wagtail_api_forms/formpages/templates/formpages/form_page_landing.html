{% extends '_base.html' %}
{% load wagtailcore_tags %}


{% block content %}

    <h1>{{ page.title }}</h1>

    {% if page.thank_you_text %}
        <div class="alert alert-info">
            {{ self.thank_you_text|richtext }}
        </div>
    {% endif %}

    <a href="{% pageurl page %}" class="btn btn-secondary my-4">
        <i class="bi bi-arrow-return-left"></i> Back to form
    </a>

{% endblock content %}
