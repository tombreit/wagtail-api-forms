DatabaseDirectory /var/lib/clamav
LogTime yes
LocalSocket /tmp/clamd.sock
# Restrict the unix socket to the clamav user/group; default perms are 0666.
LocalSocketMode 0660
TCPSocket 3310
# TCPAddr is intentionally left unset: ClamAV has no authentication on the
# TCP listener, so we rely on docker-compose binding the port to 127.0.0.1.
# NEVER set this to 0.0.0.0 in production.
# TCPAddr 0.0.0.0
Foreground yes

DetectPUA yes
ExcludePUA NetTool
ExcludePUA PWTool
ExcludePUA Pdf.Trojan.EmbeddedJavaScript-1
AlgorithmicDetection yes
Bytecode yes

ScanPE yes
DisableCertCheck yes
ScanELF yes
AlertBrokenExecutables yes
ScanOLE2 yes
ScanPDF yes
ScanSWF yes
ScanMail yes
PhishingSignatures yes
PhishingScanURLs yes
ScanHTML yes
ScanArchive yes

# Roughly 4x the app's FORMBUILDER_MAX_UPLOAD_MB (default 3M, current .env 7M).
# Keeping these tight limits the blast radius of an archive-bomb upload.
MaxScanSize 50M
MaxFileSize 25M
MaxRecursion 30
MaxFiles 50000
MaxEmbeddedPE 40M
MaxHTMLNormalize 40M
MaxHTMLNoTags 2M
MaxScriptNormalize 5M
MaxZipTypeRcg 1M
MaxPartitions 128
MaxIconsPE 200
PCREMatchLimit 10000
PCRERecMatchLimit 10000